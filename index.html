<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE GRID</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

:root {
  --cyan: #00e5ff;
  --orange: #ff6b2c;
  --bg: #0a0a0a;
  --row-bg: #111;
  --row-alt: #0d0d0d;
  --border: #1a2a2a;
  --dim: #889;
  --ch-width: 160px;
  --topbar-h: 48px;
  --header-h: 32px;
  --row-h: 56px;
  --detail-h: 130px;
}

body {
  background: var(--bg);
  color: #ccc;
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
  height: 100vh;
}

/* CRT scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.12) 2px,
    rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
  z-index: 1000;
}

/* ── Top bar ── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
  border-bottom: 2px solid var(--cyan);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 200;
}

.topbar-title {
  font-size: 20px;
  font-weight: bold;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,229,255,0.3);
  letter-spacing: 4px;
  text-transform: uppercase;
}

.topbar-right { text-align: right; }

.topbar-clock {
  font-size: 18px;
  font-weight: bold;
  color: var(--orange);
  text-shadow: 0 0 10px var(--orange), 0 0 20px rgba(255,107,44,0.3);
  letter-spacing: 2px;
}

.topbar-date {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
}

/* ── Time header row ── */
.header-row {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0;
  height: var(--header-h);
  display: flex;
  background: #0e0e0e;
  border-bottom: 1px solid var(--border);
  z-index: 150;
}

.header-pad {
  width: var(--ch-width);
  min-width: var(--ch-width);
  border-right: 2px solid var(--border);
}

.header-timeline {
  flex: 1;
  position: relative;
  overflow: visible;
}

.time-label {
  position: absolute;
  top: 0;
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;
  z-index: 5;
  pointer-events: none;
}

.time-label-hour {
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(0,229,255,0.3);
}

.time-label-half {
  color: var(--dim);
  font-weight: normal;
  font-size: 11px;
}

/* Grid lines — rendered in header, extend through viewport */
.grid-line {
  position: absolute;
  top: 0;
  width: 1px;
  height: 200vh;
  pointer-events: none;
  z-index: 2;
}

.grid-line-hour {
  width: 2px;
  background: rgba(0,229,255,0.20);
}

.grid-line-half {
  background: rgba(0,229,255,0.08);
}

/* Now indicator line */
.now-line {
  position: absolute;
  top: 0;
  width: 2px;
  height: 200vh;
  background: var(--orange);
  opacity: 0.55;
  z-index: 60;
  pointer-events: none;
  box-shadow: 0 0 6px var(--orange), 0 0 12px rgba(255,107,44,0.2);
}

.now-dot {
  position: absolute;
  top: -2px;
  left: -3px;
  width: 8px;
  height: 8px;
  background: var(--orange);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--orange);
}

/* ── Detail bar (expanded top row) ── */
.detail-bar {
  position: fixed;
  top: calc(var(--topbar-h) + var(--header-h));
  left: 0; right: 0;
  height: var(--detail-h);
  background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
  border-bottom: 1px solid var(--border);
  display: none;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  z-index: 155;
}

.detail-bar.active { display: flex; }

.detail-ch {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 180px;
  flex-shrink: 0;
}

.detail-ch-logo {
  width: 48px;
  height: 48px;
  object-fit: contain;
  border-radius: 4px;
  flex-shrink: 0;
}

.detail-ch-number {
  font-size: 22px;
  font-weight: bold;
  color: var(--cyan);
  text-shadow: 0 0 6px rgba(0,229,255,0.3);
  line-height: 1;
}

.detail-ch-name {
  font-size: 11px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.detail-poster {
  width: 64px;
  height: 96px;
  object-fit: cover;
  border-radius: 3px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.detail-info {
  flex: 1;
  min-width: 0;
  overflow: hidden;
}

.detail-title {
  font-size: 14px;
  font-weight: bold;
  color: #eee;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.detail-subtitle {
  font-size: 11px;
  color: var(--orange);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.detail-time {
  font-size: 10px;
  color: var(--dim);
  margin-top: 2px;
}

.detail-desc {
  font-size: 10px;
  color: #999;
  margin-top: 3px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── Guide scroll area ── */
.guide-wrap {
  position: fixed;
  top: calc(var(--topbar-h) + var(--header-h));
  left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

.guide-wrap.with-detail {
  top: calc(var(--topbar-h) + var(--header-h) + var(--detail-h));
}

.guide-inner {}

/* ── Channel row ── */
.ch-row {
  display: flex;
  height: var(--row-h);
  border-bottom: 1px solid var(--border);
}

.ch-row:nth-child(odd)  { background: var(--row-bg); }
.ch-row:nth-child(even) { background: var(--row-alt); }

/* Channel info column */
.ch-info {
  width: var(--ch-width);
  min-width: var(--ch-width);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  border-right: 2px solid var(--border);
}

.ch-logo {
  width: 28px;
  height: 28px;
  object-fit: contain;
  border-radius: 3px;
  flex-shrink: 0;
}

.ch-logo-placeholder {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
}

.ch-number {
  font-size: 16px;
  font-weight: bold;
  color: var(--cyan);
  text-shadow: 0 0 4px rgba(0,229,255,0.3);
  line-height: 1;
}

.ch-name {
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80px;
}

/* ── Timeline area (per row) ── */
.ch-timeline {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* ── Program block ── */
.prog-block {
  position: absolute;
  top: 4px;
  bottom: 4px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 2px 8px;
  background: #151520;
  border: 1px solid #252535;
  border-radius: 3px;
  overflow: hidden;
  cursor: default;
  transition: background 0.15s;
}

.prog-block:hover {
  background: #1e1e30;
}

.prog-block-now {
  background: #1a1a1a;
  border-color: #2a2a2a;
  border-left: 3px solid var(--orange);
}

.prog-block-now:hover {
  background: #222;
}

.prog-block-title {
  font-size: 12px;
  font-weight: bold;
  color: #ddd;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}

.prog-block-now .prog-block-title {
  color: #eee;
}

.prog-block-time {
  font-size: 9px;
  color: var(--dim);
  white-space: nowrap;
  line-height: 1.3;
}

.badge-new {
  display: inline-block;
  font-size: 8px;
  font-weight: bold;
  color: var(--bg);
  background: var(--orange);
  padding: 0 4px;
  border-radius: 2px;
  margin-left: 4px;
  vertical-align: middle;
  letter-spacing: 1px;
}

/* ── Status messages ── */
.status-msg {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  font-size: 16px;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
  letter-spacing: 2px;
}

.status-msg.error {
  color: var(--orange);
  text-shadow: 0 0 10px var(--orange);
}

/* ── Live TV Player ── */
.player-wrap {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 280px;
  background: #000;
  z-index: 210;
  display: none;
  flex-direction: column;
}

body.livetv-on .player-wrap { display: flex; }
body.livetv-on .topbar       { top: 280px; }
body.livetv-on .header-row   { top: calc(280px + var(--topbar-h)); }
body.livetv-on .guide-wrap   { top: calc(280px + var(--topbar-h) + var(--header-h)); }

.player-main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.player-sidebar {
  width: 280px;
  flex-shrink: 0;
  background: #111;
  border-left: 1px solid var(--border);
  padding: 12px;
  display: flex;
  flex-flow: row wrap;
  align-items: flex-start;
  align-content: flex-start;
  gap: 8px;
  overflow: hidden;
}

.player-sidebar .detail-ch {
  min-width: 0;
  gap: 6px;
}

.player-sidebar .detail-poster {
  width: 48px;
  height: 72px;
}

.player-sidebar .detail-info {
  flex: 0 0 100%;
}

.player-sidebar .detail-desc {
  -webkit-line-clamp: 5;
}

body.livetv-on .detail-bar { display: none !important; }

.player-video-area {
  flex: 1;
  position: relative;
  background: #000;
  overflow: hidden;
}

.player-video-area video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

.player-unmute-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 5;
  background: rgba(0,0,0,0.3);
}

.player-unmute-label {
  font-size: 14px;
  font-weight: bold;
  color: var(--cyan);
  text-shadow: 0 0 10px var(--cyan);
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 10px 24px;
  border: 2px solid var(--cyan);
  background: rgba(0,0,0,0.6);
}

.player-loading-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: rgba(0,0,0,0.75);
  z-index: 6;
}

.player-loading-overlay.active { display: flex; }

.player-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid #333;
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: player-spin 0.7s linear infinite;
}

@keyframes player-spin { to { transform: rotate(360deg); } }

.player-loading-overlay span {
  font-size: 12px;
  color: var(--cyan);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.player-error-overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  background: rgba(0,0,0,0.85);
  z-index: 7;
}

.player-error-overlay.active { display: flex; }

.player-error-msg {
  font-size: 12px;
  color: var(--orange);
  text-align: center;
  max-width: 400px;
}

.player-retry-btn {
  padding: 6px 16px;
  border: 1px solid var(--orange);
  background: transparent;
  color: var(--orange);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
}

.player-retry-btn:hover { background: rgba(255,107,44,0.15); }

.player-now-bar {
  height: 28px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: #0e0e0e;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-now-bar strong {
  color: var(--cyan);
  margin-right: 8px;
}

/* Channel indicators for live TV */
.ch-info.livetv-available {
  cursor: pointer;
}

.ch-info.livetv-available:hover {
  background: rgba(0,229,255,0.06);
}

.ch-info.livetv-active {
  background: rgba(0,229,255,0.10);
  border-right-color: var(--cyan);
}

.ch-play-icon {
  margin-left: auto;
  font-size: 10px;
  color: var(--cyan);
  opacity: 0.5;
  flex-shrink: 0;
}

.ch-info.livetv-active .ch-play-icon {
  opacity: 1;
  text-shadow: 0 0 6px var(--cyan);
}

@media (max-width: 600px) {
  :root {
    --ch-width: 90px;
    --detail-h: 110px;
  }
  .ch-logo, .ch-logo-placeholder { width: 20px; height: 20px; }
  .ch-number { font-size: 13px; }
  .ch-name { font-size: 8px; max-width: 50px; }
  .detail-ch { min-width: 100px; }
  .detail-ch-logo { width: 32px; height: 32px; }
  .detail-ch-number { font-size: 16px; }
  .detail-poster { width: 48px; height: 72px; }
  .player-wrap { height: 200px; }
  .player-sidebar { display: none; }
  body.livetv-on .detail-bar { display: flex !important; }
  body.livetv-on .topbar       { top: 200px; }
  body.livetv-on .header-row   { top: calc(200px + var(--topbar-h)); }
  body.livetv-on .detail-bar   { top: calc(200px + var(--topbar-h) + var(--header-h)); }
  body.livetv-on .guide-wrap   { top: calc(200px + var(--topbar-h) + var(--header-h)); }
  body.livetv-on .guide-wrap.with-detail { top: calc(200px + var(--topbar-h) + var(--header-h) + var(--detail-h)); }
  .ch-play-icon { display: none; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">The Grid</span>
  <div class="topbar-right">
    <div class="topbar-clock" id="clock">--:--:--</div>
    <div class="topbar-date" id="date">---</div>
  </div>
</div>

<div class="player-wrap" id="playerWrap">
  <div class="player-main">
    <div class="player-video-area">
      <video id="liveVideo" autoplay muted playsinline></video>
      <div class="player-unmute-overlay" id="unmuteOverlay">
        <div class="player-unmute-label">CLICK TO UNMUTE</div>
      </div>
      <div class="player-loading-overlay" id="playerLoading">
        <div class="player-spinner"></div>
        <span>Tuning...</span>
      </div>
      <div class="player-error-overlay" id="playerError">
        <div class="player-error-msg" id="playerErrorMsg">Playback error.</div>
        <button class="player-retry-btn" id="playerRetryBtn">RETRY</button>
      </div>
    </div>
    <div class="player-sidebar" id="playerSidebar"></div>
  </div>
  <div class="player-now-bar" id="playerNowBar">
    <strong>LIVE TV</strong> <span id="playerNowText">--</span>
  </div>
</div>

<div class="header-row">
  <div class="header-pad"></div>
  <div class="header-timeline" id="headerTimeline"></div>
</div>

<div class="detail-bar" id="detailBar"></div>

<div class="guide-wrap" id="guideWrap">
  <div class="status-msg" id="statusMsg">LOADING GUIDE DATA...</div>
  <div class="guide-inner" id="guideInner"></div>
</div>

<script>
(function() {
  'use strict';

  var guideData  = null;
  var scrollEl   = document.getElementById('guideWrap');
  var innerEl    = document.getElementById('guideInner');
  var statusEl   = document.getElementById('statusMsg');
  var headerTL   = document.getElementById('headerTimeline');
  var clockEl    = document.getElementById('clock');
  var dateEl     = document.getElementById('date');
  var detailBar     = document.getElementById('detailBar');
  var playerSidebar = document.getElementById('playerSidebar');

  var autoScroll   = true;
  var scrollSpeed  = 18; // px/sec
  var lastFrame    = 0;
  var scrollY      = 0;  // virtual scroll position (no browser cap)
  var pauseTimer   = null;
  var PAUSE_MS     = 5000;

  // ── Live TV state ──
  var liveTVEnabled   = false;
  var jfChannels      = [];
  var jfChannelMap    = {};  // channel number string → Jellyfin channel object
  var activeJFChannel = null;
  var tuneAbortController = null;
  var hlsInstance     = null;
  var playSessionId   = null;
  var playerMuted     = true;

  var liveVideoEl     = document.getElementById('liveVideo');
  var unmuteOverlay   = document.getElementById('unmuteOverlay');
  var playerLoading   = document.getElementById('playerLoading');
  var playerError     = document.getElementById('playerError');
  var playerErrorMsg  = document.getElementById('playerErrorMsg');
  var playerRetryBtn  = document.getElementById('playerRetryBtn');
  var playerNowText   = document.getElementById('playerNowText');

  // ── Clock ──
  function updateClock() {
    var now = new Date();
    clockEl.textContent = now.toLocaleTimeString('en-US', {
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    dateEl.textContent = now.toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
    });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Time window: 2 hours starting from current half-hour ──
  function getTimeWindow() {
    var now   = new Date();
    var mins  = now.getMinutes();
    var start = new Date(now.getFullYear(), now.getMonth(), now.getDate(),
                         now.getHours(), mins < 30 ? 0 : 30, 0, 0);
    var end   = new Date(start.getTime() + 2 * 3600000);
    return { start: start, end: end, dur: end - start };
  }

  // ── Fetch guide data ──
  var liveTVInitDone = false;
  function fetchGuide() {
    fetch('/api/guide.json')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        guideData = data;
        renderAll();
        if (!liveTVInitDone) {
          liveTVInitDone = true;
          initLiveTV();
        }
      })
      .catch(function(err) {
        if (!guideData) {
          statusEl.textContent  = 'SIGNAL LOST \u2014 ' + err.message;
          statusEl.className    = 'status-msg error';
          statusEl.style.display = '';
        }
      });
  }
  fetchGuide();
  setInterval(fetchGuide, 300000);    // refresh data every 5 min
  setInterval(renderAll,   60000);    // re-render every 60 sec (clock tick / now-line)

  // ── Helpers ──
  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function fmtTime(d) {
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function fmtShortTime(d) {
    return ':' + ('0' + d.getMinutes()).slice(-2);
  }

  // ── Render everything ──
  function renderAll() {
    if (!guideData || !guideData.channels) return;

    var win = getTimeWindow();
    renderHeader(win);
    renderGrid(win);
    lastDetailIdx = -1; // force detail bar refresh
    updateDetailBar();
  }

  // ── Header: time labels + grid lines + now line ──
  function renderHeader(win) {
    var html = '';
    var now  = Date.now();

    // Time marks every 30 minutes
    for (var t = win.start.getTime(); t <= win.end.getTime(); t += 1800000) {
      var pct  = ((t - win.start.getTime()) / win.dur * 100).toFixed(3);
      var d    = new Date(t);
      var isHour = d.getMinutes() === 0;

      // Don't draw a label right at the trailing edge
      if (t < win.end.getTime()) {
        var cls   = isHour ? 'time-label time-label-hour' : 'time-label time-label-half';
        var label = isHour ? fmtTime(d) : fmtShortTime(d);
        html += '<div class="' + cls + '" style="left:' + pct + '%">' + label + '</div>';
      }

      // Grid line
      var lineCls = isHour ? 'grid-line grid-line-hour' : 'grid-line grid-line-half';
      html += '<div class="' + lineCls + '" style="left:' + pct + '%"></div>';
    }

    // Now line
    if (now >= win.start.getTime() && now <= win.end.getTime()) {
      var nowPct = ((now - win.start.getTime()) / win.dur * 100).toFixed(3);
      html += '<div class="now-line" style="left:' + nowPct + '%"><div class="now-dot"></div></div>';
    }

    headerTL.innerHTML = html;
  }

  // ── Channel grid ──
  function renderGrid(win) {
    statusEl.style.display = 'none';

    var channels = guideData.channels;
    var html     = '';
    var now      = Date.now();
    var ws       = win.start.getTime();
    var we       = win.end.getTime();

    for (var c = 0; c < channels.length; c++) {
      html += renderRow(channels[c], ws, we, win.dur, now);
    }

    // Duplicate for seamless vertical loop
    innerEl.innerHTML = html + html;
  }

  function renderRow(ch, ws, we, dur, now) {
    // Channel info
    var logoHtml = ch.logoUrl
      ? '<img class="ch-logo" src="' + esc(ch.logoUrl) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '<div class="ch-logo-placeholder"></div>';

    // Live TV channel classes and play icon
    var chInfoCls = 'ch-info';
    var playIcon  = '';
    if (liveTVEnabled && jfChannelMap[ch.number]) {
      chInfoCls += ' livetv-available';
      if (activeJFChannel && jfChannelMap[ch.number].Id === activeJFChannel.Id) {
        chInfoCls += ' livetv-active';
      }
      playIcon = '<span class="ch-play-icon">\u25B6</span>';
    }

    // Programs in window
    var progsHtml = '';
    var progs     = ch.programs || [];

    for (var i = 0; i < progs.length; i++) {
      var p  = progs[i];
      var ps = new Date(p.start).getTime();
      var pe = new Date(p.end).getTime();

      // Skip if outside window
      if (pe <= ws || ps >= we) continue;

      // Clamp to window
      var cs = Math.max(ps, ws);
      var ce = Math.min(pe, we);

      var leftPct  = ((cs - ws) / dur * 100).toFixed(3);
      var widthPct = ((ce - cs) / dur * 100).toFixed(3);

      var isNow   = (ps <= now && now < pe);
      var cls     = 'prog-block' + (isNow ? ' prog-block-now' : '');
      var newBadge = p.isNew ? '<span class="badge-new">NEW</span>' : '';

      var startLabel = fmtTime(new Date(ps));
      var endLabel   = fmtTime(new Date(pe));

      progsHtml += '<div class="' + cls + '" style="left:' + leftPct + '%;width:' + widthPct + '%">' +
        '<div class="prog-block-title">' + esc(p.title) + newBadge + '</div>' +
        '<div class="prog-block-time">' + startLabel + ' \u2013 ' + endLabel + '</div>' +
      '</div>';
    }

    return '<div class="ch-row">' +
      '<div class="' + chInfoCls + '" data-ch-number="' + esc(ch.number) + '">' +
        logoHtml +
        '<div>' +
          '<div class="ch-number">' + esc(ch.number) + '</div>' +
          '<div class="ch-name">' + esc(ch.name) + '</div>' +
        '</div>' +
        playIcon +
      '</div>' +
      '<div class="ch-timeline">' + progsHtml + '</div>' +
    '</div>';
  }

  // ── Detail bar: shows expanded info for topmost channel ──
  var lastDetailIdx = -1;

  function updateDetailBar() {
    if (!guideData || !guideData.channels || !guideData.channels.length) {
      detailBar.className = 'detail-bar';
      scrollEl.className = 'guide-wrap';
      return;
    }

    var channels = guideData.channels;
    var rowH = 57; // row-h (56) + 1px border
    var channelCount = channels.length;
    var idx = Math.floor(scrollY / rowH) % channelCount;
    if (idx < 0) idx += channelCount;

    // Only re-render if the channel changed
    if (idx === lastDetailIdx) return;
    lastDetailIdx = idx;

    var ch = channels[idx];
    var now = Date.now();

    // Find current program
    var curProg = null;
    var progs = ch.programs || [];
    for (var i = 0; i < progs.length; i++) {
      var ps = new Date(progs[i].start).getTime();
      var pe = new Date(progs[i].end).getTime();
      if (ps <= now && now < pe) { curProg = progs[i]; break; }
    }
    // Fallback: next upcoming program
    if (!curProg) {
      for (var j = 0; j < progs.length; j++) {
        if (new Date(progs[j].start).getTime() > now) { curProg = progs[j]; break; }
      }
    }

    // Build HTML
    var h = '';

    // Channel section
    h += '<div class="detail-ch">';
    if (ch.logoUrl) {
      h += '<img class="detail-ch-logo" src="' + esc(ch.logoUrl) + '" alt="" onerror="this.style.display=\'none\'">';
    }
    h += '<div>';
    h += '<div class="detail-ch-number">' + esc(ch.number) + '</div>';
    h += '<div class="detail-ch-name">' + esc(ch.name) + '</div>';
    h += '</div></div>';

    if (curProg) {
      // Poster
      if (curProg.iconUrl) {
        h += '<img class="detail-poster" src="' + esc(curProg.iconUrl) + '" alt="" onerror="this.style.display=\'none\'">';
      }

      // Info
      h += '<div class="detail-info">';
      h += '<div class="detail-title">' + esc(curProg.title) + '</div>';
      if (curProg.subTitle) {
        h += '<div class="detail-subtitle">' + esc(curProg.subTitle) + '</div>';
      }
      var startLabel = fmtTime(new Date(curProg.start));
      var endLabel   = fmtTime(new Date(curProg.end));
      h += '<div class="detail-time">' + startLabel + ' \u2013 ' + endLabel + '</div>';
      if (curProg.description) {
        h += '<div class="detail-desc">' + esc(curProg.description) + '</div>';
      }
      h += '</div>';
    }

    if (liveTVEnabled) {
      playerSidebar.innerHTML = h;
      detailBar.className = 'detail-bar';
      scrollEl.className = 'guide-wrap';
    } else {
      detailBar.innerHTML = h;
      detailBar.className = 'detail-bar active';
      scrollEl.className = 'guide-wrap with-detail';
    }
  }

  // ── Live TV module ──

  function initLiveTV() {
    fetch('/api/livetv/config')
      .then(function(r) { return r.json(); })
      .then(function(cfg) {
        if (!cfg.enabled) return;
        liveTVEnabled = true;
        document.body.classList.add('livetv-on');
        fetchJFChannels().then(function() {
          // Auto-tune first matched channel
          if (guideData && guideData.channels) {
            for (var i = 0; i < guideData.channels.length; i++) {
              var jfCh = jfChannelMap[guideData.channels[i].number];
              if (jfCh) {
                tuneToJFChannel(jfCh);
                break;
              }
            }
          }
          renderAll();
        });
      })
      .catch(function() { /* live TV not available */ });
  }

  function fetchJFChannels() {
    return fetch('/api/livetv/channels')
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        jfChannels = (data && data.Items) || [];
        buildChannelMap();
      });
  }

  function buildChannelMap() {
    jfChannelMap = {};
    for (var i = 0; i < jfChannels.length; i++) {
      var ch = jfChannels[i];
      if (ch.ChannelNumber) {
        jfChannelMap[ch.ChannelNumber] = ch;
      }
    }
  }

  function tuneToJFChannel(jfCh) {
    // Show loading, hide error
    playerLoading.classList.add('active');
    playerError.classList.remove('active');

    // Abort any in-flight tune request before starting a new one
    if (tuneAbortController) {
      tuneAbortController.abort();
    }
    tuneAbortController = new AbortController();
    var signal = tuneAbortController.signal;

    // Stop previous
    stopJFStream();

    activeJFChannel = jfCh;

    // Update now-bar
    var progName = (jfCh.CurrentProgram && jfCh.CurrentProgram.Name) ? jfCh.CurrentProgram.Name : '';
    playerNowText.textContent = (jfCh.Name || 'Ch ' + jfCh.ChannelNumber) + (progName ? ' \u2014 ' + progName : '');

    // Re-render grid to update active highlights
    if (guideData) renderAll();

    // Server-side three-step handshake: returns ready-to-play HLS URL
    fetch('/api/livetv/tune?id=' + encodeURIComponent(jfCh.Id), { signal: signal })
      .then(function(r) {
        if (!r.ok) return r.text().then(function(t) { throw new Error(t || 'HTTP ' + r.status); });
        return r.json();
      })
      .then(function(result) {
        playSessionId = result.playSessionId || null;
        startHLSPlayback(result.url);
      })
      .catch(function(err) {
        if (err.name === 'AbortError') return; // superseded by a newer tune request
        playerLoading.classList.remove('active');
        playerErrorMsg.textContent = err.message || 'Failed to tune.';
        playerError.classList.add('active');
      });
  }

  function stopJFStream() {
    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }
    liveVideoEl.pause();
    liveVideoEl.removeAttribute('src');

    if (playSessionId) {
      try {
        fetch('/api/livetv/stop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ PlaySessionId: playSessionId })
        });
      } catch(e) { /* best effort */ }
      playSessionId = null;
    }
  }

  function startHLSPlayback(url) {
    var video = liveVideoEl;
    var hlsRetries = 0;
    var MAX_HLS_RETRIES = 3;

    // HLS.js first (works best cross-browser); native HLS only for Safari fallback
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        liveSyncDurationCount: 1,
        liveMaxLatencyDurationCount: 15,
        manifestLoadingMaxRetry: 6,
        manifestLoadingRetryDelay: 2000,
        levelLoadingMaxRetry: 6,
        levelLoadingRetryDelay: 2000,
        fragLoadingMaxRetry: 6,
        fragLoadingRetryDelay: 2000
      });

      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);

      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
        playerLoading.classList.remove('active');
        video.play().catch(function() {});
      });

      hlsInstance.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          hlsRetries++;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR && hlsRetries <= MAX_HLS_RETRIES) {
            console.log('HLS network error, retrying (' + hlsRetries + '/' + MAX_HLS_RETRIES + ')...');
            hlsInstance.startLoad();
          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR && hlsRetries <= MAX_HLS_RETRIES) {
            console.log('HLS media error, recovering (' + hlsRetries + '/' + MAX_HLS_RETRIES + ')...');
            hlsInstance.recoverMediaError();
          } else {
            playerErrorMsg.textContent = 'Playback error: ' + (data.details || data.type || 'Unknown');
            playerError.classList.add('active');
            playerLoading.classList.remove('active');
            hlsInstance.destroy();
            hlsInstance = null;
          }
        }
      });
    } else if (video.canPlayType && video.canPlayType('application/vnd.apple.mpegurl') !== '') {
      // Safari native HLS fallback
      video.src = url;
      video.addEventListener('canplay', function onCanPlay() {
        playerLoading.classList.remove('active');
        video.removeEventListener('canplay', onCanPlay);
      });
      video.addEventListener('error', function onErr() {
        playerErrorMsg.textContent = 'Playback error.';
        playerError.classList.add('active');
        playerLoading.classList.remove('active');
        video.removeEventListener('error', onErr);
      });
      video.play().catch(function() {});
    } else {
      playerErrorMsg.textContent = 'Browser does not support HLS playback.';
      playerError.classList.add('active');
      playerLoading.classList.remove('active');
    }
  }

  // Event delegation: clicking a live-capable channel in the grid
  innerEl.addEventListener('click', function(e) {
    var chInfo = e.target.closest('.livetv-available');
    if (!chInfo) return;
    var chNum = chInfo.getAttribute('data-ch-number');
    if (chNum && jfChannelMap[chNum]) {
      pauseAuto();
      tuneToJFChannel(jfChannelMap[chNum]);
    }
  });

  // Unmute overlay
  unmuteOverlay.addEventListener('click', function() {
    liveVideoEl.muted = false;
    playerMuted = false;
    unmuteOverlay.style.display = 'none';
  });

  // Retry button
  playerRetryBtn.addEventListener('click', function() {
    playerError.classList.remove('active');
    if (activeJFChannel) {
      tuneToJFChannel(activeJFChannel);
    }
  });

  // Cleanup on page close
  window.addEventListener('beforeunload', function() {
    if (playSessionId) {
      try {
        navigator.sendBeacon('/api/livetv/stop', new Blob([JSON.stringify({ PlaySessionId: playSessionId })], { type: 'application/json' }));
      } catch(e) { /* best effort */ }
    }
  });

  // ── Auto-scroll via translateY (avoids browser scrollTop ceiling) ──
  function applyScroll() {
    innerEl.style.transform = 'translateY(' + (-scrollY) + 'px)';
  }

  function scrollLoop(ts) {
    if (!lastFrame) lastFrame = ts;
    var dt = (ts - lastFrame) / 1000;
    lastFrame = ts;

    if (autoScroll) {
      var half = innerEl.offsetHeight / 2;
      if (half > 0) {
        scrollY += scrollSpeed * dt;
        // Seamless loop: reset when first copy has scrolled out
        if (scrollY >= half) scrollY -= half;
        applyScroll();
      }
    }
    updateDetailBar();
    requestAnimationFrame(scrollLoop);
  }
  requestAnimationFrame(scrollLoop);

  function pauseAuto() {
    autoScroll = false;
    clearTimeout(pauseTimer);
    pauseTimer = setTimeout(function() { autoScroll = true; }, PAUSE_MS);
  }

  // Wheel: manual scroll, pause auto-scroll, resume after idle
  scrollEl.addEventListener('wheel', function(e) {
    e.preventDefault();
    var half = innerEl.offsetHeight / 2;
    scrollY += e.deltaY;
    if (half > 0) {
      scrollY = ((scrollY % half) + half) % half; // wrap around
    }
    applyScroll();
    pauseAuto();
  }, { passive: false });

  // Touch: pause while touching, resume after idle
  scrollEl.addEventListener('touchstart', function() {
    autoScroll = false;
    clearTimeout(pauseTimer);
  }, { passive: true });
  scrollEl.addEventListener('touchend', function() {
    pauseAuto();
  }, { passive: true });

})();
</script>
</body>
</html>
